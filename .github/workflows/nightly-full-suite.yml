name: nightly-full-suite

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  frontend-full:
    name: frontend-full
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit -p tsconfig.app.json
      - run: npm run test
      - run: npm run build

  backend-full:
    name: backend-full
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: creativechain
          POSTGRES_PASSWORD: creativechain
          POSTGRES_DB: creativechain
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U creativechain -d creativechain"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://creativechain:creativechain@localhost:5432/creativechain?sslmode=require
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      POLYGON_AMOY_RPC_URL: https://rpc-amoy.polygon.technology
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python manage.py migrate --noinput
      - run: python manage.py test --keepdb --noinput

  contracts-full:
    name: contracts-full
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: npm ci
      - run: pip install slither-analyzer==0.11.5
      - run: npm run compile
      - run: npm run coverage
      - run: npm run analyze


